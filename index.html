<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We-ERP | Amazon Scraper Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');

        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --neon-yellow: #ffff00;
            --neon-cyan: #00f0ff;
            --text-main: #c9d1d9;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Tajawal', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .dashboard-container {
            background: var(--panel-bg);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 
                        inset 0 0 0 2px rgba(255, 255, 0, 0.1);
            position: relative;
            overflow: hidden;
        }

        /* تأثير إضاءة علوي */
        .dashboard-container::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,0,0.05) 0%, transparent 60%);
            pointer-events: none;
        }

        h1 {
            text-align: center;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-yellow), 0 0 20px var(--neon-yellow);
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(13, 17, 23, 0.8);
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            transform-style: preserve-3d;
        }

        .stat-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 25px rgba(0, 240, 255, 0.2);
            border-color: var(--neon-cyan);
        }

        .stat-title {
            font-size: 1.1rem;
            color: var(--neon-cyan);
            margin-bottom: 15px;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        .categories-section {
            background: rgba(13, 17, 23, 0.8);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 40px;
            border: 1px solid rgba(255, 255, 0, 0.2);
        }

        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 15px;
        }

        .cyber-checkbox {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 10px 15px;
            border-radius: 8px;
            background: #0d1117;
            border: 1px solid #30363d;
            transition: all 0.3s ease;
        }

        .cyber-checkbox input {
            display: none;
        }

        .cyber-checkbox span {
            margin-right: 10px;
        }

        .cyber-checkbox input:checked + span {
            color: var(--neon-yellow);
            text-shadow: 0 0 5px var(--neon-yellow);
        }

        .cyber-checkbox:has(input:checked) {
            border-color: var(--neon-yellow);
            box-shadow: inset 0 0 10px rgba(255, 255, 0, 0.2);
        }

        .btn-3d {
            display: block;
            width: 100%;
            padding: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            font-family: inherit;
            color: #000;
            background: var(--neon-yellow);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 8px 0 #b3b300, 0 15px 20px rgba(0,0,0,0.4);
            transition: all 0.1s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-3d:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0 #b3b300, 0 5px 10px rgba(0,0,0,0.4);
        }

        .btn-3d::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-25deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            100% { left: 200%; }
        }

        .status-dot {
            display: inline-block;
            width: 10px; height: 10px;
            background: red;
            border-radius: 50%;
            margin-left: 10px;
            box-shadow: 0 0 10px red;
        }
        .status-dot.active {
            background: #00ff00;
            box-shadow: 0 0 10px #00ff00;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <h1>أتمتة سحب البيانات - Amazon</h1>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-title">المنتجات المسحوبة</div>
                <div class="stat-value" id="productCounter">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">وقت التشغيل</div>
                <div class="stat-value" id="timer">00:00:00</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">الأقسام المحددة</div>
                <div class="stat-value" id="categoryCounter">0</div>
            </div>
        </div>

        <div class="categories-section">
            <h3 style="margin-top:0; color: #fff;">اختر الأقسام المطلوبة:</h3>
            <div class="checkbox-group">
                <label class="cyber-checkbox">
                    <input type="checkbox" class="cat-check" value="coffee" onchange="updateCatCount()">
                    <span>آلات القهوة</span>
                </label>
                <label class="cyber-checkbox">
                    <input type="checkbox" class="cat-check" value="electronics" onchange="updateCatCount()">
                    <span>الإلكترونيات</span>
                </label>
                <label class="cyber-checkbox">
                    <input type="checkbox" class="cat-check" value="home" onchange="updateCatCount()">
                    <span>أجهزة المنزل</span>
                </label>
                <label class="cyber-checkbox">
                    <input type="checkbox" class="cat-check" value="all" onchange="selectAll(this)">
                    <span>تحديد الكل</span>
                </label>
            </div>
        </div>

        <button class="btn-3d" id="startBtn" onclick="startScraping()">
            <span class="status-dot" id="statusDot"></span>
            بدء السحب الآلي
        </button>
    </div>

    <script>
        // ضع رابط Google Apps Script الخاص بك هنا (نفس الرابط القديم)
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxA8qQ5j8AnfpxHEQzyEzFH-2jZzauPHpawKlt_ZaSLFgDHMtVleYh-892gYP8oW3ZM/exec";
        
        let timerInterval;
        let updateInterval;
        let seconds = 0;
        let isRunning = false;

        function updateCatCount() {
            const checkedBoxes = document.querySelectorAll('.cat-check:checked:not([value="all"])').length;
            document.getElementById('categoryCounter').innerText = checkedBoxes;
        }

        function selectAll(source) {
            const checkboxes = document.querySelectorAll('.cat-check');
            checkboxes.forEach(cb => {
                if (cb.value !== 'all') {
                    cb.checked = source.checked;
                }
            });
            updateCatCount();
        }

        function updateTimer() {
            seconds++;
            const hrs = String(Math.floor(seconds / 3600)).padStart(2, '0');
            const mins = String(Math.floor((seconds % 3600) / 60)).padStart(2, '0');
            const secs = String(seconds % 60).padStart(2, '0');
            document.getElementById('timer').innerText = `${hrs}:${mins}:${secs}`;
        }

        // جلب عدد المنتجات لايف من جوجل شيت
        async function fetchLiveCount() {
            if(!isRunning) return;
            try {
                const response = await fetch(GAS_API_URL);
                const data = await response.json();
                if(data.status === 'success') {
                    // أنيميشن تصاعدي للرقم
                    animateValue("productCounter", parseInt(document.getElementById("productCounter").innerText), data.products_count, 1000);
                }
            } catch (error) {
                console.error("Error fetching live data:", error);
            }
        }

        function animateValue(id, start, end, duration) {
            if (start === end) return;
            let range = end - start;
            let current = start;
            let increment = end > start ? 1 : -1;
            let stepTime = Math.abs(Math.floor(duration / range));
            let obj = document.getElementById(id);
            let timer = setInterval(function() {
                current += increment;
                obj.innerHTML = current;
                if (current == end) {
                    clearInterval(timer);
                }
            }, stepTime);
        }

        function startScraping() {
            const btn = document.getElementById('startBtn');
            const dot = document.getElementById('statusDot');
            const selectedCats = Array.from(document.querySelectorAll('.cat-check:checked:not([value="all"])')).map(cb => cb.value);

            if (selectedCats.length === 0 && !isRunning) {
                alert("برجاء تحديد قسم واحد على الأقل!");
                return;
            }

            if (!isRunning) {
                // التشغيل
                isRunning = true;
                btn.innerHTML = '<span class="status-dot active"></span> جاري السحب... (اضغط للإيقاف)';
                btn.style.boxShadow = "0 8px 0 #008000, 0 15px 20px rgba(0,0,0,0.4)";
                btn.style.border = "2px solid #00ff00";
                
                // هنا مستقبلاً نقدر نبعت الـ selectedCats للـ API عشان نتحكم في الأقسام
                
                seconds = 0;
                timerInterval = setInterval(updateTimer, 1000);
                // تحديث العداد كل 5 ثواني
                updateInterval = setInterval(fetchLiveCount, 5000); 
                fetchLiveCount(); // أول سحبة فوراً

            } else {
                // الإيقاف
                isRunning = false;
                clearInterval(timerInterval);
                clearInterval(updateInterval);
                btn.innerHTML = '<span class="status-dot" id="statusDot"></span> بدء السحب الآلي';
                btn.style.boxShadow = "0 8px 0 #b3b300, 0 15px 20px rgba(0,0,0,0.4)";
                btn.style.border = "none";
            }
        }
    </script>
</body>
</html>
